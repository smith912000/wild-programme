<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #080c14; font-family: 'Georgia', serif; }
  canvas { position: absolute; top: 0; left: 0; }
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .content {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
    padding: 0 140px;
  }
  .tag {
    font-size: 15px; letter-spacing: 5px; text-transform: uppercase;
    color: #c9a84c; opacity: 0.7; margin-bottom: 24px;
    font-family: 'Courier New', monospace;
  }
  .title {
    font-size: 108px; font-weight: 900; line-height: 0.92;
    color: #f5f0e8; letter-spacing: -3px;
    font-family: 'Georgia', serif;
    text-shadow: 0 0 80px rgba(201,168,76,0.25);
  }
  .title span { color: #c9a84c; }
  .divider {
    width: 80px; height: 2px; background: #c9a84c;
    margin: 36px 0; opacity: 0.6;
  }
  .subtitle {
    font-size: 22px; color: #8a9bb5; letter-spacing: 3px;
    text-transform: uppercase; font-family: 'Courier New', monospace;
    line-height: 1.8;
  }
  .data-pill {
    display: inline-block; border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; padding: 6px 14px; font-size: 13px;
    color: #c9a84c; font-family: 'Courier New', monospace;
    margin-right: 12px; margin-top: 32px; letter-spacing: 2px;
  }
  .right-panel {
    position: absolute; right: 0; top: 0; width: 680px; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
</style>
