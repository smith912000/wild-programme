<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#5865f2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5865f2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#30363d" stroke-width="1" rx="16"/>
  <!-- Top badge -->
  <rect x="480" y="80" width="240" height="32" rx="16" fill="none" stroke="#5865f2" stroke-opacity="0.4"/>
  <text x="600" y="100" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#5865f2" text-transform="uppercase">WILD PROGRAMME</text>
  <!-- Main headline -->
  <text x="600" y="200" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="800" fill="#e6edf3" letter-spacing="-2">Wake Inside</text>
  <text x="600" y="285" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="800" fill="#5865f2" letter-spacing="-2">Your Dreams</text>
  <!-- Subtext -->
  <text x="600" y="360" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="24" fill="#8b949e">The science-backed system for Wake-Induced Lucid Dreaming</text>
  <!-- Divider -->
  <line x1="480" y1="400" x2="720" y2="400" stroke="#30363d" stroke-width="1"/>
  <!-- Stats row -->
  <text x="320" y="460" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#e6edf3">7</text>
  <text x="320" y="490" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#8b949e">Night Protocol</text>
  <text x="600" y="460" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#e6edf3">3</text>
  <text x="600" y="490" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#8b949e">Course Tiers</text>
  <text x="880" y="460" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#e6edf3">Free</text>
  <text x="880" y="490" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#8b949e">To Start</text>
  <!-- URL -->
  <text x="600" y="575" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#5865f2">smith912000.github.io/wild-programme</text>
