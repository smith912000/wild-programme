<!DOCTYPE html><html><head><meta charset="utf-8"><title>BreathingFigure Preview</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#08080f;display:flex;gap:24px;align-items:flex-start;justify-content:center;padding:32px 16px;flex-wrap:wrap;min-height:100vh}.card{display:flex;flex-direction:column;align-items:center;gap:8px}.label{color:#c9a84c;font-family:system-ui,sans-serif;font-size:10px;letter-spacing:3px;opacity:.7;text-transform:uppercase}</style>
</head><body><script>
const G='#c9a84c';
function cr2b(pts){const n=pts.length,cmds=[`M ${pts[0][0]},${pts[0][1]}`];for(let i=0;i<n;i++){const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];const cp1x=(p1[0]+(p2[0]-p0[0])/6).toFixed(2),cp1y=(p1[1]+(p2[1]-p0[1])/6).toFixed(2),cp2x=(p2[0]-(p3[0]-p1[0])/6).toFixed(2),cp2y=(p2[1]-(p3[1]-p1[1])/6).toFixed(2);cmds.push(`C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`)}cmds.push('Z');return cmds.join(' ')}
const BASE=[
  [125,12],[150,8],[174,22],[186,46],[190,68],
  [184,86],[173,100],[161,113],[148,125],
  [136,139],[126,164],
  [140,174],[192,198],[238,248],[224,295],
  [158,326],[164,352],[174,384],[161,412],[145,432],
  [143,445],[78,445],
  [68,428],[57,402],[63,374],[53,344],[55,312],
  [58,278],[62,244],[66,210],[71,178],[77,160],
  [84,146],[91,126],[98,105],[106,82],[108,56],[116,30]
];
const BW={16:.55,17:1,18:.65,19:.2},CW={12:.5,13:1,14:.75,15:.08};
function build(bO,cO){return cr2b(BASE.map(([x,y],i)=>{let nx=x;if(BW[i]!==undefined)nx+=bO*BW[i];if(CW[i]!==undefined)nx+=cO*CW[i];return[nx,y]}))}
function fig(bO,cO,lbl){
  const d=build(bO,cO),id=lbl.replace(/\W/g,'-');
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`<svg viewBox="0 0 290 490" width="185" height="313" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
<defs>
<radialGradient id="f${id}" cx="64%" cy="38%" r="55%"><stop offset="0%" stop-color="${G}" stop-opacity=".16"/><stop offset="100%" stop-color="${G}" stop-opacity=".02"/></radialGradient>
<filter id="g${id}" x="-50%" y="-20%" width="200%" height="140%"><feGaussianBlur stdDeviation="2.4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<path d="${d}" fill="url(#f${id})" stroke="none"/>
<path d="${d}" fill="none" stroke="${G}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity=".82" filter="url(#g${id})"/>
</svg><div class="label">${lbl}</div>`;
  document.body.appendChild(div);
}
fig(0,0,'REST');
fig(28,0,'BELLY IN');
fig(28,22,'HOLD (both)');
fig(0,22,'EXHALE BELLY');
fig(0,0,'EXHALE CHEST');
</script></body></html>
